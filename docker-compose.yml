version: "3.9"

# Portfolio Optimizer — Docker Compose stack
#
# Services:
#   mlflow    — MLflow tracking server (always starts)
#   api       — FastAPI inference + backtesting service (always starts)
#   training  — PPO training job (profile: training — must be invoked explicitly)
#   frontend  — Next.js dashboard (always starts)
#
# Quick start:
#   docker-compose up                                  # mlflow + api + frontend
#   docker-compose --profile training up training      # run a training job
#
# For educational and demonstration purposes only.

services:

  # ── MLflow tracking server ────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: portfolio_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri /mlruns
        --default-artifact-root /mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI service ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: portfolio_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
      - ./models:/app/models
    depends_on:
      mlflow:
        condition: service_healthy

  # ── Training job (invoke with --profile training) ─────────────────────────
  training:
    build:
      context: .
      dockerfile: Dockerfile.training
    container_name: portfolio_training
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      USE_SYNTHETIC_DATA: "true"
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
      - ./models:/app/models
    depends_on:
      mlflow:
        condition: service_healthy
    profiles:
      - training   # only runs with: docker-compose --profile training up training

  # ── Next.js frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portfolio_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  mlruns:
  models:
